<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Daily Brief</title>
  <!-- ── Primary Meta Tags ── -->
  <meta name="title" content="News Page | Delta American Schools" />
  <meta name="description" content="Stay up to date with the latest news, announcements, and events from Delta American Schools in Mansoura, Egypt." />
  <meta name="keywords"
    content="Delta American Schools, DAS, Mansoura, international school, Egypt, American curriculum" />
  <meta name="author" content="Delta American Schools" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://yourdomain.com/PAGE-URL" />
  
  <!-- ── Open Graph (Facebook, WhatsApp, LinkedIn previews) ── -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://yourdomain.com/PAGE-URL" />
  <meta property="og:title" content="News Page | Delta American Schools" />
  <meta property="og:description" content="Stay up to date with the latest news, announcements, and events from Delta American Schools in Mansoura, Egypt." />
  <meta property="og:image" content="https://yourdomain.com/pictures/Logos/logo.png" />
  <meta property="og:locale" content="en_US" />
  <meta property="og:locale:alternate" content="ar_EG" />
  <meta property="og:site_name" content="Delta American Schools" />
  
  <!-- ── Twitter Card ── -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="News Page | Delta American Schools" />
  <meta name="twitter:description" content="Stay up to date with the latest news, announcements, and events from Delta American Schools in Mansoura, Egypt." />
  <meta name="twitter:image" content="https://yourdomain.com/pictures/Logos/logo.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap"
    rel="stylesheet" />

  <!-- Link -->
  <link rel="stylesheet" href="news.css">
  <script src="../i18n.js" defer></script>
  <script src="news.js" defer></script>
</head>

<body>

  <!-- Masthead -->
  <header class="masthead">
    <button id="lang-toggle" aria-label="Toggle language"
      onclick="I18N.setLang(I18N.currentLang()==='en'?'ar':'en')"><span>عربي</span>
    </button>
    <p class="masthead-date" id="today-date"></p>
    <h1 class="masthead-title" data-i18n="newsPage.mastheadTitle">The Daily Brief</h1>
    <div class="masthead-rule">
      <hr /><span data-i18n="newsPage.mastheadRule">Est. 2011 · All the news worth reading</span>
      <hr />
    </div>
  </header>

  <!-- Category Filter -->
  <nav class="filter-bar" id="filter-bar">
    <button class="filter-btn active" data-cat="">All</button>
  </nav>

  <!-- Posts -->
  <main class="container">
    <div id="posts-grid">
      <div class="state" id="loading-state">
        <div class="spinner"></div>
        <p>Fetching today's stories…</p>
      </div>
    </div>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modal-close">✕</button>
      <img class="modal-img" id="modal-img" src="" alt="" />
      <div class="modal-body">
        <p class="modal-category" id="modal-category"></p>
        <h2 class="modal-title" id="modal-title"></h2>
        <p class="modal-meta" id="modal-meta"></p>
        <div class="modal-text" id="modal-text"></div>
      </div>
    </div>
  </div>

  <footer>
    <p>© <span id="year"></span> The Daily Brief · Powered by MongoDB</p>
  </footer>

</body>

</html>
